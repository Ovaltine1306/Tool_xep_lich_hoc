<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>HUST Schedule Engine - Soft Arcade Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      /* HẠ TƯƠNG PHẢN: Chuyển từ đen kịt sang xám đá Slate dịu mắt */
      --bg-main: #181a1f;
      --bg-sidebar: #1e222b;
      --bg-card: #282c34;
      --pixel-border: 4px solid #4b5263;
      --grid-border: 1px solid #282c34;
      --text-main: #abb2bf;
      --text-light: #ffffff;
      --text-muted: #5c6370;
      
      /* Màu Neon dịu (Muted Retro Palette) */
      --p-blue: #4fc3f7;
      --p-green: #81c784;
      --p-purple: #ba68c8;
      --p-orange: #ffb74d;
      --p-red: #e57373;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; padding: 0; 
      font-family: 'VT323', monospace; 
      text-transform: uppercase;
    }
    body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; font-size: 16px; }

    /* SIDEBAR CONTROL */
    aside { width: 380px; background-color: var(--bg-sidebar); border-right: var(--pixel-border); padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; flex-shrink: 0; }
    h2 { font-size: 26px; color: var(--p-green); text-shadow: 2px 2px 0px #000; }
    .subtitle { font-size: 13px; color: var(--p-blue); margin-top: -5px; }
    
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 14px; color: var(--text-light); }
    input[type="text"] { background-color: #111; border: var(--pixel-border); padding: 8px; color: var(--p-blue); font-size: 17px; outline: none; }
    input[type="text"]:focus { border-color: var(--p-green); }

    /* BUỔI NGHỈ MATRIX */
    .filter-section { border: var(--pixel-border); padding: 12px; background: #111; box-shadow: 4px 4px 0px #222; }
    .filter-title { font-size: 14px; margin-bottom: 10px; color: var(--p-orange); }
    
    .matrix-table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: center; }
    .matrix-table th { color: var(--text-muted); padding-bottom: 6px; font-weight: normal; }
    .matrix-table td { padding: 3px 1px; }
    .matrix-btn { display: block; width: 100%; padding: 5px 0; background: #222; border: 2px solid #3e4451; color: var(--text-muted); cursor: pointer; user-select: none; }
    .matrix-btn.active { background: var(--p-red); color: #000; border-color: #ff8a80; font-weight: bold; }

    /* TIẾT HỌC SELECT */
    .time-range-group { display: flex; gap: 10px; }
    select { flex: 1; background-color: #111; border: var(--pixel-border); padding: 6px; color: var(--p-blue); font-size: 14px; outline: none; cursor: pointer; }

    /* RUN ENGINE BUTTON */
    .btn-submit { 
      background-color: var(--p-green); color: #000; 
      border: var(--pixel-border); padding: 12px; 
      font-size: 20px; font-weight: bold; cursor: pointer; 
      box-shadow: 4px 4px 0px #388e3c; transition: 0.1s;
    }
    .btn-submit:hover { background-color: #a5d6a7; transform: translate(2px, 2px); box-shadow: 2px 2px 0px #388e3c; }
    .btn-submit:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #388e3c; }
    .btn-submit:disabled { background-color: #444; border-color: #555; color: #222; cursor: not-allowed; box-shadow: none; transform: none; }

    /* MAIN AREA */
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-main); }
    
    /* CONTROL HEADER: NƠI CHỨA MŨI TÊN CHUYỂN PHƯƠNG ÁN */
    header { padding: 15px 20px; border-bottom: var(--pixel-border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-sidebar); }
    h3 { font-size: 22px; color: var(--text-light); }
    
    .nav-container { display: flex; align-items: center; gap: 15px; background: #111; padding: 5px 10px; border: var(--pixel-border); }
    .btn-nav { background: var(--bg-card); border: 2px solid #4b5263; color: var(--text-light); padding: 4px 12px; font-size: 16px; cursor: pointer; user-select: none; }
    .btn-nav:hover { background: #3e4451; color: var(--p-blue); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
    #pageIndicator { font-size: 16px; color: var(--p-orange); min-width: 120px; text-align: center; }

    .content-area { flex: 1; padding: 20px; overflow: auto; display: flex; flex-direction: column; justify-content: flex-start; }

    /* ======================================================== */
    /* CHUYÊN MỤC: DỰNG KHUNG LỊCH TUẦN BẰNG CSS GRID THẦN THÁNH */
    /* ======================================================== */
    .calendar-container {
      display: grid;
      grid-template-columns: 80px repeat(7, 1fr); /* 1 cột Tiết + 7 cột Thứ */
      grid-template-rows: 40px repeat(12, 45px); /* 1 hàng Header Thứ + 12 hàng Tiết học */
      border: var(--pixel-border);
      background-color: #111;
      position: relative;
      width: 100%;
      min-width: 750px;
    }

    .calendar-cell {
      border: var(--grid-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Định vị hàng tiêu đề các Thứ (Hàng 1) */
    .header-cell {
      background-color: var(--bg-sidebar);
      color: var(--text-light);
      font-weight: bold;
      border-bottom: var(--pixel-border);
    }

    /* Định vị cột nhãn Tiết học (Cột 1) */
    .period-label {
      background-color: var(--bg-sidebar);
      color: var(--p-orange);
      font-weight: bold;
      border-right: var(--pixel-border);
    }

    /* THẺ LỚP HỌC ĐÈ LÊN LƯỚI LỊCH (DYNAMIC OVERLAY) */
    .schedule-block {
      border: 2px solid #fff;
      padding: 4px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      box-shadow: 3px 3px 0px rgba(0,0,0,0.5);
      z-index: 10;
      overflow: hidden;
    }
    .block-title { font-size: 15px; font-weight: bold; color: #000; }
    .block-meta { font-size: 12px; color: #333; margin-top: 2px; font-weight: bold; }

    /* Hệ màu dịu mắt cho các khối môn học */
    .c-blue { background-color: var(--p-blue); border-color: #00b0ff; }
    .c-green { background-color: var(--p-green); border-color: #00e676; }
    .c-purple { background-color: var(--p-purple); border-color: #d500f9; }
    .c-orange { background-color: var(--p-orange); border-color: #ff9100; }

    /* TRẠNG THÁI UTILITIES */
    .error-box { padding: 12px; border: 3px solid var(--p-red); background: #2a1b1b; color: var(--p-red); font-size: 13px; display: none; }
    .empty-state { text-align: center; color: var(--text-muted); font-size: 16px; padding: 60px; border: 4px dashed #282c34; width: 100%; line-height: 2; }
    .spinner { display: none; font-size: 14px; color: var(--p-green); animation: blink 0.5s infinite alternate; }
    @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }
  </style>
</head>
<body>

  <aside>
    <div>
      <h2>HUST_OS v2.5</h2>
      <div class="subtitle">> SOFT CALENDAR EDITION</div>
    </div>

    <div class="form-group">
      <label>MÃ HỌC PHẦN MONG MUỐN</label>
      <input type="text" id="subjectCodes" value="EM1170, IT3140, MI1141">
    </div>

    <div class="filter-section">
      <div class="filter-title">[CHỌN BUỔI ÉP BUỘC NGHỈ]</div>
      <table class="matrix-table">
        <thead>
          <tr>
            <th></th><th>T2</th><th>T3</th><th>T4</th><th>T5</th><th>T6</th><th>T7</th><th>CN</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style="color:var(--p-blue);">SÁNG</td>
            <td><div class="matrix-btn" data-day="2" data-session="morning">S</div></td>
            <td><div class="matrix-btn" data-day="3" data-session="morning">S</div></td>
            <td><div class="matrix-btn" data-day="4" data-session="morning">S</div></td>
            <td><div class="matrix-btn" data-day="5" data-session="morning">S</div></td>
            <td><div class="matrix-btn" data-day="6" data-session="morning">S</div></td>
            <td><div class="matrix-btn" data-day="7" data-session="morning">S</div></td>
            <td><div class="matrix-btn" data-day="8" data-session="morning">S</div></td>
          </tr>
          <tr>
            <td style="color:var(--p-purple);">CHIỀU</td>
            <td><div class="matrix-btn" data-day="2" data-session="afternoon">C</div></td>
            <td><div class="matrix-btn" data-day="3" data-session="afternoon">C</div></td>
            <td><div class="matrix-btn" data-day="4" data-session="afternoon">C</div></td>
            <td><div class="matrix-btn" data-day="5" data-session="afternoon">C</div></td>
            <td><div class="matrix-btn" data-day="6" data-session="afternoon">C</div></td>
            <td><div class="matrix-btn" data-day="7" data-session="afternoon">C</div></td>
            <td><div class="matrix-btn" data-day="8" data-session="afternoon">C</div></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="filter-section">
      <div class="filter-title">[KHOẢNG TIẾT CẤU HÌNH]</div>
      <div class="time-range-group">
        <div class="form-group" style="flex:1;">
          <label>TỪ TIẾT</label>
          <select id="startPeriod">
            <option value="1">TIẾT 1</option>
            <option value="3">TIẾT 3</option>
            <option value="6">TIẾT 6</option>
            <option value="8">TIẾT 8</option>
          </select>
        </div>
        <div class="form-group" style="flex:1;">
          <label>ĐẾN TIẾT</label>
          <select id="endPeriod">
            <option value="6">TIẾT 6</option>
            <option value="10">TIẾT 10</option>
            <option value="12" selected>TIẾT 12</option>
          </select>
        </div>
      </div>
    </div>

    <div id="errorBox" class="error-box"></div>
    <button id="generateBtn" class="btn-submit">MỞ KHÓA LỊCH TRÌNH</button>
  </aside>

  <main>
    <header>
      <h3>[XEM THỜI KHÓA BIỂU]</h3>
      
      <div class="nav-container" id="navContainer" style="display: none;">
        <button class="btn-nav" id="prevBtn">&lt; LÙI</button>
        <span id="pageIndicator">PHƯƠNG ÁN 0 / 0</span>
        <button class="btn-nav" id="nextBtn">TIẾP &gt;</button>
      </div>

      <div style="display: flex; align-items: center; gap: 12px;">
        <div id="spinner" class="spinner">PROCESSING...</div>
      </div>
    </header>

    <div class="content-area" id="mainContent">
      <div class="empty-state">> CHƯA CÓ DỮ LIỆU.<br>> NHẬP MÃ MÔN VÀ BẤM NÚT ĐỂ TRÍCH XUẤT PHƯƠNG ÁN LỊCH HỌC TUẦN.</div>
    </div>
  </main>

  <script>
    (function () {
      const generateBtn = document.getElementById("generateBtn");
      const subjectInput = document.getElementById("subjectCodes");
      const startPeriodEl = document.getElementById("startPeriod");
      const endPeriodEl = document.getElementById("endPeriod");
      const spinner = document.getElementById("spinner");
      const mainContent = document.getElementById("mainContent");
      const errorBox = document.getElementById("errorBox");
      
      // Khai báo điều hướng mũi tên toàn cục
      const navContainer = document.getElementById("navContainer");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const pageIndicator = document.getElementById("pageIndicator");

      let globalSchedules = [];
      let currentPlanIndex = 0;

      // Xử lý click chọn buổi nghỉ
      document.querySelectorAll(".matrix-btn").forEach(btn => {
        btn.addEventListener("click", () => btn.classList.toggle("active"));
      });

      function getSelectedDayOffs() {
        const disabledSessions = [];
        document.querySelectorAll(".matrix-btn.active").forEach(btn => {
          disabledSessions.push({
            dayOfWeek: parseInt(btn.getAttribute("data-day")),
            session: btn.getAttribute("data-session")
          });
        });
        return disabledSessions;
      }

      // Đắp màu theo mã môn dịu mắt
      const colorPool = ['c-blue', 'c-green', 'c-purple', 'c-orange'];
      const subjectColorMap = {};
      function getSubjectColor(code) {
        if (!subjectColorMap[code]) {
          subjectColorMap[code] = colorPool[Object.keys(subjectColorMap).length % colorPool.length];
        }
        return subjectColorMap[code];
      }

      // ĐIỀU HƯỚNG MŨI TÊN: Bấm lùi
      prevBtn.addEventListener("click", () => {
        if (currentPlanIndex > 0) {
          currentPlanIndex--;
          renderActivePlan();
        }
      });

      // ĐIỀU HƯỚNG MŨI TÊN: Bấm tiếp
      nextBtn.addEventListener("click", () => {
        if (currentPlanIndex < globalSchedules.length - 1) {
          currentPlanIndex++;
          renderActivePlan();
        }
      });

      // VẼ GRID LỊCH TUẦN TRỐNG BẰNG JS TRƯỚC
      function createEmptyCalendarDOM() {
        const container = document.createElement("div");
        container.className = "calendar-container";

        // 1. Tạo hàng tiêu đề Thứ (Hàng 1)
        const days = ["TIẾT", "THỨ 2", "THỨ 3", "THỨ 4", "THỨ 5", "THỨ 6", "THỨ 7", "CHỦ NHẬT"];
        days.forEach((day, colIdx) => {
          const cell = document.createElement("div");
          cell.className = "calendar-cell header-cell";
          cell.style.gridColumn = colIdx + 1;
          cell.style.gridRow = 1;
          cell.textContent = day;
          container.appendChild(cell);
        });

        // 2. Tạo cột Nhãn Tiết học (Cột 1, từ Hàng 2 đến 13) và các ô trống nền
        for (let p = 1; p <= 12; p++) {
          const label = document.createElement("div");
          label.className = "calendar-cell period-label";
          label.style.gridColumn = 1;
          label.style.gridRow = p + 1;
          label.textContent = "T" + p;
          container.appendChild(label);

          // Vẽ các ô lưới rỗng phía sau làm background
          for (let d = 2; d <= 8; d++) {
            const emptyCell = document.createElement("div");
            emptyCell.className = "calendar-cell";
            emptyCell.style.gridColumn = d;
            emptyCell.style.gridRow = p + 1;
            container.appendChild(emptyCell);
          }
        }
        return container;
      }

      // ĐỔ DỮ LIỆU CỦA PHƯƠNG ÁN ĐANG CHỌN LÊN GRID LỊCH TUẦN
      function renderActivePlan() {
        mainContent.innerHTML = "";
        
        // Cập nhật trạng thái nút bấm và text hiển thị
        pageIndicator.textContent = "PHƯƠNG ÁN " + (currentPlanIndex + 1) + " / " + globalSchedules.length;
        prevBtn.disabled = (currentPlanIndex === 0);
        nextBtn.disabled = (currentPlanIndex === globalSchedules.length - 1);

        const calendarDOM = createEmptyCalendarDOM();
        const activePlan = globalSchedules[currentPlanIndex];

        // Duyệt toàn bộ các lớp của phương án hiện tại để phủ đè lên Lưới CSS Grid
        const classes = Array.isArray(activePlan.classes) ? activePlan.classes : [];
        classes.forEach(c => {
          // Bóc chuỗi period "2-4" -> start = 2, end = 4
          let startPeriod = 1, endPeriod = 1;
          if (c.period && c.period.includes("-")) {
            const parts = c.period.split("-");
            startPeriod = parseInt(parts[0]);
            endPeriod = parseInt(parts[1]);
          } else if (c.period) {
            startPeriod = parseInt(c.period);
            endPeriod = parseInt(c.period);
          }

          const block = document.createElement("div");
          block.className = "schedule-block " + getSubjectColor(c.subjectCode);
          
          // 🔥 ĐỊNH VỊ CHÍ C MẠNG BẰNG CSS GRID: 
          // Cột = dayOfWeek (Thứ 2 ứng với cột 2, CN ứng với cột 8)
          block.style.gridColumn = c.dayOfWeek;
          // Hàng bắt đầu = startPeriod + 1, Hàng kết thúc = endPeriod + 2 (Do hàng 1 là tiêu đề Thứ)
          block.style.gridRow = (startPeriod + 1) + " / " + (endPeriod + 2);

          // Nhồi thông tin mã môn, mã lớp, phòng học vào khối lịch vuông
          block.innerHTML = 
            '<div class="block-title">' + c.subjectCode + '</div>' +
            '<div class="block-meta">LỚP: ' + (c.classCode || "N/A") + '</div>' +
            '<div class="block-meta">PHÒNG: ' + (c.room || "TBD") + '</div>';

          calendarDOM.appendChild(block);
        });

        mainContent.appendChild(calendarDOM);
        
        // Thêm một dòng tổng quan số tín chỉ ở dưới chân lịch cho tiện theo dõi
        const footerInfo = document.createElement("div");
        footerInfo.style.marginTop = "15px";
        footerInfo.style.fontSize = "18px";
        footerInfo.style.color = "var(--p-green)";
        footerInfo.textContent = "> TỔNG SỐ TÍN CHỈ PHƯƠNG ÁN NÀY: " + (activePlan.totalCredits ?? 0) + " TÍN CHỈ.";
        mainContent.appendChild(footerInfo);
      }

      async function onGenerateClick() {
        errorBox.style.display = "none";
        spinner.style.display = "block";
        generateBtn.disabled = true;

        try {
          const subjectCodes = subjectInput.value.trim();
          const filters = {
            disabledSessions: getSelectedDayOffs(),
            startPeriod: parseInt(startPeriodEl.value),
            endPeriod: parseInt(endPeriodEl.value)
          };

          if (typeof window.taoTKB !== "function") {
            throw new Error("GIAO DIỆN CẦU NỐI C++ CHƯA SẴN SÀNG.");
          }

          const raw = await window.taoTKB(subjectCodes, filters);
          const parsed = typeof raw === "string" ? JSON.parse(raw) : raw;
          
          if (!parsed || !Array.isArray(parsed.schedules) || parsed.schedules.length === 0) {
            navContainer.style.display = "none";
            mainContent.innerHTML = '<div class="empty-state">❌ KHÔNG TÌM THẤY PHƯƠNG ÁN THỜI KHÓA BIỂU NÀO PHÙ HỢP VỚI BỘ LỌC HIỆN TẠI!</div>';
            return;
          }

          // Nạp dữ liệu vào mảng toàn cục để sẵn sàng lật trang bằng mũi tên
          globalSchedules = parsed.schedules;
          currentPlanIndex = 0;
          
          // Hiện thanh mũi tên điều hướng lên
          navContainer.style.display = "flex";
          
          // Kích hoạt vẽ phương án đầu tiên
          renderActivePlan();

        } catch (err) {
          navContainer.style.display = "none";
          mainContent.innerHTML = '<div class="empty-state">HỆ THỐNG GẶP LỖI BIÊN DỊCH DỮ LIỆU.</div>';
          errorBox.style.display = "block";
          errorBox.textContent = "CRITICAL: " + (err.message || "LỖI ENGINE KHÔNG XÁC ĐỊNH.");
          console.error(err); 
        } finally {
          spinner.style.display = "none";
          generateBtn.disabled = false;
        }
      }

      generateBtn.addEventListener("click", onGenerateClick);
    })();
  </script>
</body>
</html>
