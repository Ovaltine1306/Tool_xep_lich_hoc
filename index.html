<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>HUST Schedule Engine - Pixel Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #000000;
      --bg-sidebar: #111111;
      --bg-card: #222222;
      --pixel-border: 4px solid #ffffff;
      --text-main: #ffffff;
      --text-muted: #888888;
      
      /* Retro Neon Palette */
      --p-blue: #00ffff;
      --p-green: #39ff14;
      --p-purple: #cc00ff;
      --p-orange: #ff9900;
      --p-red: #ff0055;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; padding: 0; 
      font-family: 'Press Start 2P', 'Courier New', monospace; 
      text-transform: uppercase;
    }
    body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; font-size: 10px; }

    /* SIDEBAR CONTROL */
    aside { width: 400px; background-color: var(--bg-sidebar); border-right: var(--pixel-border); padding: 20px; display: flex; flex-direction: column; gap: 24px; overflow-y: auto; }
    h2 { font-size: 14px; color: var(--p-green); text-shadow: 3px 3px 0px #000; margin-bottom: 4px; }
    .subtitle { font-size: 8px; color: var(--p-blue); margin-bottom: 10px; }
    
    .form-group { display: flex; flex-direction: column; gap: 10px; }
    label { font-size: 8px; color: var(--text-main); }
    input[type="text"] { background-color: #000; border: var(--pixel-border); padding: 12px; color: var(--p-blue); font-size: 10px; outline: none; }
    input[type="text"]:focus { border-color: var(--p-green); }

    /* MATRIX TABLE */
    .filter-section { border: var(--pixel-border); padding: 12px; background: #000; box-shadow: 4px 4px 0px #333; }
    .filter-title { font-size: 8px; margin-bottom: 12px; color: var(--p-orange); }
    
    .matrix-table { width: 100%; border-collapse: collapse; font-size: 8px; }
    .matrix-table th { color: var(--text-muted); padding-bottom: 8px; font-weight: normal; }
    .matrix-table td { padding: 4px 2px; }
    .matrix-btn { display: block; width: 100%; padding: 8px 0; background: #222; border: 2px solid #555; color: var(--text-muted); cursor: pointer; user-select: none; text-align: center; }
    .matrix-btn.active { background: var(--p-red); color: #fff; border-color: #ff0000; box-shadow: inset -2px -2px 0px #800; }

    /* SELECT TIME */
    .time-range-group { display: flex; gap: 10px; }
    select { flex: 1; background-color: #000; border: var(--pixel-border); padding: 8px; color: var(--p-blue); font-size: 8px; outline: none; cursor: pointer; }

    /* PIXEL BUTTON */
    .btn-submit { 
      background-color: var(--p-green); color: #000; 
      border: var(--pixel-border); padding: 14px; 
      font-size: 11px; font-weight: bold; cursor: pointer; 
      box-shadow: 4px 4px 0px #005500; transition: 0.1s;
      margin-top: 10px;
    }
    .btn-submit:hover { background-color: #2ecc71; transform: translate(2px, 2px); box-shadow: 2px 2px 0px #005500; }
    .btn-submit:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #005500; }
    .btn-submit:disabled { background-color: #555; border-color: #888; color: #333; cursor: not-allowed; box-shadow: none; transform: none; }

    /* MAIN VIEW */
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #050505; }
    header { padding: 20px; border-bottom: var(--pixel-border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-sidebar); }
    h3 { font-size: 14px; color: #fff; }
    .status-badge { font-size: 8px; padding: 6px 10px; background: #000; border: 2px solid var(--text-muted); }
    
    .content-area { flex: 1; padding: 20px; overflow-y: auto; }
    .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; }

    /* ARCADE CARDS */
    .card { 
      background-color: var(--bg-sidebar); 
      border: var(--pixel-border); 
      padding: 14px;
      box-shadow: 6px 6px 0px #1c1f24; 
      display: flex; flex-direction: column; gap: 12px;
    }
    .card:hover { border-color: var(--p-blue); box-shadow: 6px 6px 0px rgba(0,255,255,0.2); }
    .card-head { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #444; padding-bottom: 8px; }
    .schedule-id { font-size: 10px; color: #fff; }
    .credits { font-size: 8px; color: var(--p-green); }
    
    .class-list { display: flex; flex-direction: column; gap: 12px; }
    .class-item { padding: 10px; border: 2px solid #444; background: #000; display: flex; flex-direction: column; gap: 8px; }
    
    /* Pixel Dynamic Left Border Color */
    .c-blue { border-left: 6px solid var(--p-blue); }
    .c-green { border-left: 6px solid var(--p-green); }
    .c-purple { border-left: 6px solid var(--p-purple); }
    .c-orange { border-left: 6px solid var(--p-orange); }

    .class-meta { display: flex; flex-direction: column; gap: 6px; font-size: 9px; color: #fff; }
    .class-code-badge { font-size: 8px; color: var(--p-orange); background: #111; padding: 4px; border: 1px dashed var(--p-orange); width: fit-content; margin-top: 2px; }
    .class-details { font-size: 8px; color: var(--text-muted); display: flex; justify-content: space-between; border-top: 1px solid #222; padding-top: 6px; }

    /* UTILITIES */
    .error-box { padding: 12px; border: 3px solid var(--p-red); background: #200; color: var(--p-red); font-size: 8px; display: none; line-height: 1.4; }
    .empty-state { text-align: center; color: var(--text-muted); font-size: 9px; padding: 40px; border: 4px dashed #333; line-height: 1.8; }
    
    /* RETRO LOADING SPINNER */
    .spinner { display: none; font-size: 8px; color: var(--p-green); animation: blink 0.5s infinite alternate; }
    @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }
  </style>
</head>
<body>

  <aside>
    <div>
      <h2>HUST_OS v2.0</h2>
      <div class="subtitle">> INSERT COIN TO START</div>
    </div>

    <div class="form-group">
      <label>INPUT CODES [MA HOC PHAN]</label>
      <input type="text" id="subjectCodes" value="EM1170, IT3140, MI1141">
    </div>

    <div class="filter-section">
      <div class="filter-title">[SELECT DAYS OFF]</div>
      <table class="matrix-table">
        <thead>
          <tr>
            <th></th><th>T2</th><th>T3</th><th>T4</th><th>T5</th><th>T6</th><th>T7</th><th>CN</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style="color:var(--p-blue);">AM</td>
            <td><div class="matrix-btn" data-day="2" data-session="morning">M</div></td>
            <td><div class="matrix-btn" data-day="3" data-session="morning">M</div></td>
            <td><div class="matrix-btn" data-day="4" data-session="morning">M</div></td>
            <td><div class="matrix-btn" data-day="5" data-session="morning">M</div></td>
            <td><div class="matrix-btn" data-day="6" data-session="morning">M</div></td>
            <td><div class="matrix-btn" data-day="7" data-session="morning">M</div></td>
            <td><div class="matrix-btn" data-day="8" data-session="morning">M</div></td>
          </tr>
          <tr>
            <td style="color:var(--p-purple);">PM</td>
            <td><div class="matrix-btn" data-day="2" data-session="afternoon">A</div></td>
            <td><div class="matrix-btn" data-day="3" data-session="afternoon">A</div></td>
            <td><div class="matrix-btn" data-day="4" data-session="afternoon">A</div></td>
            <td><div class="matrix-btn" data-day="5" data-session="afternoon">A</div></td>
            <td><div class="matrix-btn" data-day="6" data-session="afternoon">A</div></td>
            <td><div class="matrix-btn" data-day="7" data-session="afternoon">A</div></td>
            <td><div class="matrix-btn" data-day="8" data-session="afternoon">A</div></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="filter-section">
      <div class="filter-title">[PERIOD LIMITS]</div>
      <div class="time-range-group">
        <div class="form-group" style="flex:1;">
          <label>FROM</label>
          <select id="startPeriod">
            <option value="1">P1 (06:45)</option>
            <option value="3">P3 (08:25)</option>
            <option value="6">P6 (12:30)</option>
            <option value="8">P8 (14:10)</option>
          </select>
        </div>
        <div class="form-group" style="flex:1;">
          <label>TO</label>
          <select id="endPeriod">
            <option value="6">P6 (11:45)</option>
            <option value="10">P10 (15:55)</option>
            <option value="12" selected>P12 (17:45)</option>
          </select>
        </div>
      </div>
    </div>

    <div id="errorBox" class="error-box"></div>

    <button id="generateBtn" class="btn-submit">RUN ENGINE</button>
  </aside>

  <main>
    <header>
      <h3>[AVAILABLE STAGES]</h3>
      <div style="display: flex; align-items: center; gap: 16px;">
        <div id="spinner" class="spinner">LOADING...</div>
        <div id="statusText" class="status-badge">READY</div>
      </div>
    </header>

    <div class="content-area">
      <div id="resultGrid" class="grid-layout">
        <div class="empty-state">> SYSTEM IDLE.<br>> ENTER CODES AND PRESS RUN ENGINE TO START THE BACKTRACKING SIMULATION.</div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const generateBtn = document.getElementById("generateBtn");
      const subjectInput = document.getElementById("subjectCodes");
      const startPeriodEl = document.getElementById("startPeriod");
      const endPeriodEl = document.getElementById("endPeriod");
      const spinner = document.getElementById("spinner");
      const resultGrid = document.getElementById("resultGrid");
      const statusText = document.getElementById("statusText");
      const errorBox = document.getElementById("errorBox");

      const matrixButtons = document.querySelectorAll(".matrix-btn");
      matrixButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          btn.classList.toggle("active");
        });
      });

      function getSelectedDayOffs() {
        const disabledSessions = [];
        document.querySelectorAll(".matrix-btn.active").forEach(btn => {
          disabledSessions.push({
            dayOfWeek: parseInt(btn.getAttribute("data-day")),
            session: btn.getAttribute("data-session")
          });
        });
        return disabledSessions;
      }

      function setLoading(isLoading) {
        spinner.style.display = isLoading ? "block" : "none";
        generateBtn.disabled = isLoading;
        statusText.textContent = isLoading ? "LOADING" : "READY";
      }

      const colorPool = ['c-blue', 'c-green', 'c-purple', 'c-orange'];
      const subjectColorMap = {};
      function getSubjectColor(code) {
        if (!subjectColorMap[code]) {
          subjectColorMap[code] = colorPool[Object.keys(subjectColorMap).length % colorPool.length];
        }
        return subjectColorMap[code];
      }

      function renderSchedules(payload) {
        if (!payload || !Array.isArray(payload.schedules) || payload.schedules.length === 0) {
          resultGrid.innerHTML = '<div class="empty-state">❌ FATAL ERROR: NO VALID PLANS FOUND WITH THE CURRENT FILTER SETTINGS.</div>';
          statusText.textContent = "DONE (0)";
          return;
        }

        const cards = payload.schedules.map((schedule) => {
          const classes = Array.isArray(schedule.classes) ? schedule.classes : [];
          const classRows = classes.map((c) => {
            const colorClass = getSubjectColor(c.subjectCode);
            return (
              '<div class="class-item ' + colorClass + '">' +
                '<div class="class-meta">' +
                  '<span>HP: ' + (c.subjectCode || "N/A") + '</span>' +
                  // 🔥 HIỂN THỊ MÃ LỚP HỌC ĐƯỢC TRUYỀN TỪ C++ SANG:
                  '<span class="class-code-badge">MÃ LỚP: ' + (c.classCode || "N/A") + '</span>' +
                '</div>' +
                '<div class="class-details">' +
                  '<span>DAY ' + (c.dayOfWeek === 8 ? "CN" : c.dayOfWeek) + '</span>' +
                  '<span>P: ' + (c.period || "?") + '</span>' +
                  '<span>RM: ' + (c.room || "TBD") + '</span>' +
                '</div>' +
              '</div>'
            );
          }).join("");

          return (
            '<article class="card">' +
              '<div class="card-head">' +
                '<div class="schedule-id">PLAN #' + (schedule.id || "?") + "</div>" +
                '<div class="credits">CR: ' + (schedule.totalCredits ?? 0) + "</div>" +
              "</div>" +
              '<div class="class-list">' + (classRows || '<div class="class-item">EMPTY STAGE</div>') + "</div>" +
            "</article>"
          );
        }).join("");

        resultGrid.innerHTML = cards;
        statusText.textContent = "LOADED (" + payload.schedules.length + ")";
      }

      async function onGenerateClick() {
        errorBox.style.display = "none";
        setLoading(true);

        try {
          const subjectCodes = subjectInput.value.trim();
          const filters = {
            disabledSessions: getSelectedDayOffs(),
            startPeriod: parseInt(startPeriodEl.value),
            endPeriod: parseInt(endPeriodEl.value)
          };

          if (typeof window.taoTKB !== "function") {
            throw new Error("BRIDGE INTERFACE DISCONNECTED.");
          }

          const raw = await window.taoTKB(subjectCodes, filters);
          const parsed = typeof raw === "string" ? JSON.parse(raw) : raw;
          renderSchedules(parsed);
        } catch (err) {
          resultGrid.innerHTML = '<div class="empty-state">EXECUTION FAILED.</div>';
          errorBox.style.display = "block";
          errorBox.textContent = "CRITICAL: " + (err.message || "UNKNOWN ENGINE ERROR.");
          statusText.textContent = "FAILURE";
          console.error(err); 
        } finally {
          setLoading(false);
        }
      }

      generateBtn.addEventListener("click", onGenerateClick);
    })();
  </script>
</body>
</html>
